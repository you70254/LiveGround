<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寫心得 — LiveGround</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/form-page.css">
    <link rel="stylesheet" href="CSS/review-new.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body class="theme-light">
    <!-- NAV -->
    <nav id="LG_NAV">
        <a href="index.html" class="nav-logo">
            <img src="img/logo-LiveGround.svg">
        </a>
        <div class="nav-links">
            <div class="nav-line"></div>
            <a href="#" class="nav-login">登入</a>
        </div>
    </nav>

    <!-- HERO（深色） -->
    <section class="form-page-hero">
        <div class="review-new-hero-bg"></div>
        <div class="review-new-hero-overlay"></div>
        <h1>寫心得</h1>
        <div class="hero-breadcrumb">
            <p class="hero-sub">分享你的參戰記錄，讓更多粉絲看見每個現場的溫度</p>
            <a class="back" href="review.html"><span class="arrow-left">←</span>返回心得列表</a>
        </div>
    </section>

    <main class="form-page-main">

        <!-- 場次資訊 -->
        <section class="form-section">
            <h2 class="form-section__title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
                </svg>
                場次資訊
            </h2>

            <div class="form-row">
                <div class="form-field">
                    <label for="review-artist">藝人<span class="req">*</span></label>
                    <select id="review-artist" name="review-artist">
                        <option value="" selected>請選擇藝人</option>
                        <option value="OOR">ONE OK ROCK</option>
                        <option value="SPBV">SUPER BEAVER</option>
                        <option value="LAS">Fear,and Loathing in Las Vegas</option>
                    </select>
                </div>
                <div class="form-field">
                    <label for="review-tour">巡迴場次<span class="req">*</span></label>
                    <select id="review-tour" name="review-tour">
                        <option value="" selected>請先選擇藝人</option>
                        <option value="oor-2026">2026 PREMONITION WORLD TOUR</option>
                    </select>
                </div>
            </div>

            <div class="form-field form-field--full">
                <label>參加日期<span class="req">*</span></label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="review-dates" value="2026-04-25">
                        2026.04.25（六）</label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="review-dates" value="2026-04-26">
                        2026.04.26（日）</label>
                </div>
            </div>
        </section>

        <!-- 心得內容 -->
        <section class="form-section">
            <h2 class="form-section__title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125" />
                </svg>
                心得內容
            </h2>

            <div class="form-field form-field--full">
                <label>心得類型<span class="req">*</span></label>
                <div class="review-new-type-group">
                    <label class="review-new-type-pill">
                        <input type="checkbox" name="review-type" value="live-report">
                        現場回報
                    </label>
                    <label class="review-new-type-pill">
                        <input type="checkbox" name="review-type" value="prep">
                        遠征準備
                    </label>
                    <label class="review-new-type-pill">
                        <input type="checkbox" name="review-type" value="merch">
                        周邊分享
                    </label>
                    <label class="review-new-type-pill">
                        <input type="checkbox" name="review-type" value="feel">
                        感想記錄
                    </label>
                </div>
            </div>

            <div class="form-field form-field--full">
                <label for="review-title">標題<span class="req">*</span></label>
                <input type="text" id="review-title" name="review-title" placeholder="例：第一次遠征大阪 — 比想像中還要震撼" required>
            </div>

            <div class="form-field form-field--full">
                <label for="review-body">內文<span class="req">*</span></label>
                <textarea id="review-body" name="review-body" rows="10" placeholder="寫下你的參戰記憶..." required></textarea>
                <span class="char-count" id="review-char-count">0 / 1000 字</span>
            </div>
        </section>

        <!-- 附圖上傳 -->
        <section class="form-section">
            <h2 class="form-section__title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                </svg>
                附圖（選填）
            </h2>
            <label class="upload-area" for="review-imgs">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
                </svg>
                <span class="upload-text">點擊上傳圖片（可多張，JPG / PNG）</span>
                <input type="file" id="review-imgs" name="review-imgs" accept="image/*" multiple hidden>
            </label>
            <p class="review-new-img-hint">1 張將直接展開顯示；2 張以上縮圖陳列</p>
        </section>

        <!-- 送出區 -->
        <div class="form-actions">
            <a href="review.html" class="btn-cancel">取消</a>
            <button type="submit" class="btn-submit">發布心得</button>
        </div>

    </main>

    <!-- FOOTER -->
    <footer id="LG_FOOTER">
        <div class="footer-content">
            <div class="footer-top">
                <div class="footer-top-left">
                    <p class="footer-logo">LiveGround</p>
                    <p class="footer-slogan">Live until the last song ends.</p>
                </div>
                <div class="footer-social">
                    <a href="">twitter</a>
                    <a href="">instagram</a>
                    <a href="">discord</a>
                </div>
            </div>
            <div class="footer-links">
                <a href="">關於本站</a>
                <a href="">使用條款</a>
                <a href="">隱私政策</a>
                <a href="">聯絡我們</a>
            </div>
            <p class="footer-copyright">© 2025 LiveGround. For fans, by fans.</p>
        </div>
    </footer>
</body>

</html>
